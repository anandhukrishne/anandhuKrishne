<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Breach | AnandhuKrishne</title>
    <link rel="stylesheet" href="ASSETS/css/vanilla.css">
    <style>
        :root {
            --error-red: #ff4757;
            --tech-black: #1a1a1a;
        }

        body {
            background-color: var(--tech-black);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .error-container {
            border: 4px solid var(--error-red);
            padding: 40px;
            background: repeating-linear-gradient(
                45deg,
                #1a1a1a,
                #1a1a1a 10px,
                #222 10px,
                #222 20px
            ); /* Subtle Ben Day dot vibe */
            box-shadow: 10px 10px 0px var(--error-red);
        }

        .glitch {
            font-size: 5rem;
            font-weight: bold;
            text-transform: uppercase;
            position: relative;
            text-shadow: 2px 2px var(--error-red);
        }

        .message {
            font-family: 'Courier New', Courier, monospace;
            margin: 20px 0;
            color: #ccc;
        }

        .drone-alert {
            color: var(--error-red);
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .back-btn {
            background: var(--error-red);
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
            border-radius: 0; /* Keeping it blocky/comic style */
            transition: transform 0.2s;
        }

        .back-btn:hover {
            transform: scale(1.1);
            background: white;
            color: var(--error-red);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="glitch">404</div>
        <h2>UNAUTHORIZED ACCESS</h2>
        <div class="message">
            <p>> Signal Lost... <br>
               > Parakkum Thalika drone is off-radar. <br>
               > Tracking coordinates: IIIT Kottayam Server Error.</p>
        </div>
        <p class="drone-alert">⚠️ EMERGENCY RECALL INITIATED ⚠️</p>
        <a href="index.html" class="back-btn">RETURN TO BASE</a>
    </div>

</body>
</html>
